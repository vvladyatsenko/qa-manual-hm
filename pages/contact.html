<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../style.css" />
    <title>Contact</title>
  </head>
  <body id="contact_page">
    <h1 class="contact_page--title">Contact</h1>

    <p class="contact_page--text">Fill out the small contact form below.</p>

    <form class="contact_page--form">
      <label class="contact_page--label" for="name">Name:</label>
      <input
        class="contact_page--input"
        type="text"
        id="name"
        name="name"
        placeholder="Enter your name"
      />
      <br /><br />

      <label class="contact_page--label" for="email">Email:</label>
      <input
        class="contact_page--input"
        type="email"
        id="email"
        name="email"
        placeholder="Enter your email"
      />
      <br /><br />

      <label class="contact_page--label" for="message">Message:</label>
      <input
        class="contact_page--input"
        type="text"
        id="message"
        name="message"
        placeholder="Your message"
      />
      <br /><br />

      <button class="contact_page--button" type="submit">Send</button>
    </form>

    <br />

    <table class="contact_page--table" border="1">
      <tr class="contact_page--table_row">
        <th class="contact_page--table_head">Name</th>
        <th class="contact_page--table_head">Email</th>
        <th class="contact_page--table_head">Message</th>
      </tr>
      <tr class="contact_page--table_row">
        <td class="contact_page--table_data">John Doe</td>
        <td class="contact_page--table_data">john@example.com</td>
        <td class="contact_page--table_data">
          Hello, I would like to contact you.
        </td>
      </tr>
      <tr class="contact_page--table_row">
        <td class="contact_page--table_data">Jane Smith</td>
        <td class="contact_page--table_data">jane@example.com</td>
        <td class="contact_page--table_data">I really like your website.</td>
      </tr>
    </table>

    <footer class="contact_page--footer">
      <br />
      <a class="contact_page--link" href="/index.html"><strong>Home</strong></a>
      <br />
      <a class="contact_page--link" href="/pages/gallery.html"
        ><strong>Gallery</strong></a
      >
    </footer>
  </body>
</html>
