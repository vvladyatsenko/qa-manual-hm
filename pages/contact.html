<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
  </head>
  <body>
    <h1>Contact</h1>

    <p>Fill out the small contact form below.</p>

    <form>
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" placeholder="Enter your name" />
      <br /><br />

      <label for="email">Email:</label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="Enter your email"
      />
      <br /><br />

      <label for="message">Message:</label>
      <input
        type="text"
        id="message"
        name="message"
        placeholder="Your message"
      />
      <br /><br />

      <button type="submit">Send</button>
    </form>

    <br />

    <table border="1">
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Message</th>
      </tr>
      <tr>
        <td>John Doe</td>
        <td>john@example.com</td>
        <td>Hello, I would like to contact you.</td>
      </tr>
      <tr>
        <td>Jane Smith</td>
        <td>jane@example.com</td>
        <td>I really like your website.</td>
      </tr>
    </table>

    <footer>
      <br />
      <a href="/index.html"><strong>Home</strong></a>
      <br />
      <a href="/pages/gallery.html"><strong>Gallery</strong></a>
    </footer>
  </body>
</html>
